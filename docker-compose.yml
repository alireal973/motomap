version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: motomap_db
    environment:
      POSTGRES_USER: motomap
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-motomap_dev_secret}
      POSTGRES_DB: motomap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U motomap"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: motomap_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: motomap_api
    ports:
      - "8008:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://motomap:${POSTGRES_PASSWORD:-motomap_dev_secret}@postgres:5432/motomap
      REDIS_URL: redis://redis:6379
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change_me_in_production}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload --reload-exclude "tmp*" --reload-exclude "pytest-*" --reload-exclude ".tmp*"

volumes:
  postgres_data:
  redis_data:
